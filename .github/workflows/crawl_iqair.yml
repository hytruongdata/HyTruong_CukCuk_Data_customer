name: Crawl Customer Data Infocom
on:
  schedule:
    - cron: '0 1,6 * * *'  # Chạy vào 8h sáng (01 UTC) và 1h chiều (06 UTC) theo giờ Việt Nam (GMT+7)
  workflow_dispatch:  # Cho phép chạy thủ công

permissions:
  contents: write

jobs:
  crawl-and-update:
    # ĐỔI THÀNH UBUNTU-22.04 ĐỂ TRÁNH LỖI THIẾU THƯ VIỆN HỆ THỐNG
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Create Result Folders
        run: |
          mkdir -p result/infocom_data
          mkdir -p result/infocom_datanew

      - name: Run crawler
        run: python crawl_datacustomer.py

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with GitHub Remote
        run: |
          git fetch origin master
          git checkout origin/master -- result/infocom_data/ || echo "Chưa có dữ liệu cũ"
          git pull origin master --no-rebase

      - name: Commit and Push changes
        run: |
          git add result/
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Tự động cập nhật dataset cào mới vào infocom_datanew [skip ci]"
            git push origin master
          else
            echo "Không tìm thấy file Excel mới nào được sinh ra trong folder result/infocom_datanew!"
          fi
